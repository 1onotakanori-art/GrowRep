<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowRep Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
:root {
    --pri: #667eea; --pri-d: #5568d3; --bg: linear-gradient(135deg,#667eea,#764ba2);
    --card: #fff; --sh: 0 1px 8px rgba(0,0,0,.07); --tx: #333; --tx2: #888; --bdr: #e8e8e8;
    --ok: #27ae60; --ng: #e74c3c; --warn: #f39c12; --info: #3498db;
    --r: 10px; --fs: 12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;color:var(--tx);font-size:var(--fs);padding:6px;min-height:100vh}

/* ---- Login ---- */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:var(--r);padding:24px;max-width:340px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.18);text-align:center}
.login-box h1{font-size:1.5em;color:var(--pri);margin-bottom:2px}
.login-box .sub{color:var(--tx2);font-size:12px;margin-bottom:16px}
.login-box input{width:100%;padding:9px 10px;margin-bottom:10px;border:1.5px solid var(--bdr);border-radius:7px;font-size:13px}
.login-box input:focus{outline:none;border-color:var(--pri)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.btn-pri{background:var(--pri);color:#fff;width:100%}.btn-pri:active{background:var(--pri-d)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.btn-info{background:var(--info);color:#fff}.btn-info:active{background:#2980b9}
.btn-ng{background:var(--ng);color:#fff}.btn-ng:active{background:#c0392b}
.btn-warn{background:var(--warn);color:#fff}.btn-warn:active{background:#e67e22}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:active{background:#219a52}
.btn-ghost{background:transparent;color:var(--pri);border:1.5px solid var(--pri)}.btn-ghost:active{background:#eef2ff}
.err{color:var(--ng);font-size:11px;margin-top:6px}.err:empty{display:none}

/* ---- Header ---- */
.hdr{background:#fff;border-radius:var(--r);padding:10px 14px;margin-bottom:8px;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.hdr h1{font-size:1.1em;color:var(--pri);white-space:nowrap}
.hdr-acts{display:flex;gap:5px;align-items:center}
.hdr-user{font-size:10px;color:var(--tx2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---- Loading ---- */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:999;font-size:13px;color:var(--pri)}
.loading.hide{display:none}

/* ---- Accordion Card ---- */
.card{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden}
.card-h{padding:10px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.card-h .ico{font-size:13px}.card-h .arr{margin-left:auto;transition:.2s;font-size:10px}
.card-h.shut .arr{transform:rotate(-90deg)}
.card-b{padding:10px 14px}.card-b.shut{display:none}

/* Color themes */
.th-green{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a5c2e}
.th-orange{background:linear-gradient(135deg,#f7971e,#ffd200);color:#6b3a00}
.th-pink{background:linear-gradient(135deg,#f093fb,#f5576c);color:#5c0a2e}
.th-purple{background:linear-gradient(135deg,var(--pri),#764ba2);color:#fff}

/* ---- Stats chips ---- */
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:#f5f7ff;border:1px solid #e0e4ff;border-radius:8px;padding:6px 10px;text-align:center;min-width:58px}
.chip .v{font-size:1.3em;font-weight:800;color:var(--pri);line-height:1.1}
.chip .l{font-size:9px;color:var(--tx2)}

/* ---- Exercise card list ---- */
.ex-card{background:#f8f9ff;border:1px solid #eef1ff;border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start}
.ex-card .ex-icon{font-size:16px;color:var(--pri);min-width:20px;text-align:center;padding-top:1px}
.ex-card .ex-body{flex:1;min-width:0}
.ex-card .ex-name{font-weight:700;font-size:12px}
.ex-card .ex-meta{font-size:10px;color:var(--tx2);margin-top:2px;word-break:break-word}
.ex-card .ex-tags{margin-top:3px;display:flex;flex-wrap:wrap;gap:3px}

/* ---- Badges ---- */
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600}
.badge-tag{background:#eef2ff;color:var(--pri)}
.badge-barb{background:#fff3e0;color:#e65100}
.badge-sel{background:#e8f5e9;color:#2e7d32}
.badge-star{background:#fff8e1;color:#f57f17}

/* ---- Weekly challenge exercise cards ---- */
.wk-ex{background:linear-gradient(135deg,#fff8e1,#fff3e0);border:1px solid #ffe0b2;border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.wk-ex .wk-icon{font-size:18px;color:#f57f17}
.wk-ex .wk-body{flex:1;min-width:0}
.wk-ex .wk-name{font-weight:700;font-size:12px}
.wk-ex .wk-sub{font-size:10px;color:#888;margin-top:1px}
.wk-ex .wk-acts{display:flex;gap:4px}

/* ---- Weight list ---- */
.wt-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f3f3f3}
.wt-item:last-child{border-bottom:none}
.wt-rank{font-size:10px;color:var(--tx2);min-width:16px;text-align:right}
.wt-name{flex:1;font-size:11px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wt-count{font-size:10px;color:var(--tx2);min-width:28px;text-align:center}
.wt-bar-wrap{width:60px;height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;flex-shrink:0}
.wt-bar{height:100%;border-radius:5px;transition:.3s}
.wt-pct{font-size:10px;font-weight:700;min-width:34px;text-align:right}

/* ---- Info panel ---- */
.info-panel{background:#f8f9ff;border:1px solid #e0e4ff;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:11px}
.info-panel .ip-row{display:flex;justify-content:space-between;padding:2px 0}
.info-panel .ip-label{color:var(--tx2);font-weight:600}
.info-panel .ip-val{font-weight:700;color:var(--tx)}

/* ---- Config controls ---- */
.cfg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.cfg-row label{font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap}
.cfg-row input[type=number],.cfg-row select{padding:6px 8px;border:1.5px solid var(--bdr);border-radius:7px;font-size:12px;width:70px}
.cfg-hint{font-size:10px;color:var(--tx2);margin-bottom:8px;line-height:1.4}
.cfg-result{font-size:11px;padding:8px 10px;background:#e8f5e9;border-radius:7px;color:var(--ok);margin-top:6px}
.cfg-result:empty{display:none}
.cfg-result.cfg-err{background:#fde8e8;color:var(--ng)}

/* ---- Multiplier grid ---- */
.mul-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;margin-bottom:10px}
.mul-item{background:#f8f9ff;border:1px solid #e8ecff;border-radius:7px;padding:6px 8px;text-align:center}
.mul-item .mn{font-size:9px;color:var(--tx2)}
.mul-item .mv{font-size:1.2em;font-weight:800;color:var(--pri)}

/* ---- Champ cards ---- */
.champ-card{background:linear-gradient(135deg,#fffde7,#fff8e1);border:1px solid #ffe082;border-radius:8px;padding:8px 10px;margin-bottom:6px}
.champ-card .cc-week{font-size:10px;color:#bf8f00;font-weight:600}
.champ-card .cc-name{font-size:12px;font-weight:700;color:#f57f17}
.champ-card .cc-score{font-size:11px;color:var(--tx)}
.champ-card .cc-ex{margin-top:3px;display:flex;flex-wrap:wrap;gap:3px}

/* ---- History list ---- */
.hist-item{padding:6px 0;border-bottom:1px solid #f3f3f3;font-size:11px}
.hist-item:last-child{border-bottom:none}
.hist-id{font-size:10px;color:var(--tx2);font-family:monospace}
.hist-date{color:var(--tx2)}
.hist-ex{margin-top:2px;display:flex;flex-wrap:wrap;gap:3px}

/* ---- User grid ---- */
.usr-grid{display:grid;grid-template-columns:1fr;gap:5px}
.usr-card{background:#f8f9ff;border:1px solid #e8ecff;border-radius:7px;padding:7px 10px}
.usr-card .un{font-weight:700;color:var(--pri);font-size:11px}
.usr-card .ue{font-size:10px;color:var(--tx2)}

/* ---- Confirm overlay ---- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.overlay.hide{display:none}
.overlay-box{background:#fff;border-radius:var(--r);padding:18px;max-width:340px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.overlay-box h3{font-size:14px;margin-bottom:8px;color:var(--tx)}
.overlay-box p{font-size:12px;color:var(--tx2);margin-bottom:12px}
.overlay-btns{display:flex;gap:8px;justify-content:flex-end}

/* ---- Toast ---- */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:2000;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

/* ---- Responsive ---- */
@media(min-width:600px){
    body{padding:10px;max-width:600px;margin:0 auto}
    .usr-grid{grid-template-columns:1fr 1fr}
}
@media(min-width:900px){
    body{max-width:800px;font-size:13px}
}
    </style>
</head>
<body>

<!-- ========== Login ========== -->
<div id="login-wrap" class="login-wrap" style="display:none">
    <div class="login-box">
        <h1><i class="fa-solid fa-shield-halved"></i> GrowRep</h1>
        <p class="sub">管理者ダッシュボード</p>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="password" placeholder="パスワード">
        <button id="login-btn" class="btn btn-pri"><i class="fa-solid fa-right-to-bracket"></i> ログイン</button>
        <p id="auth-error" class="err"></p>
    </div>
</div>

<!-- ========== Main ========== -->
<div id="app" style="display:none">

<!-- Header -->
<div class="hdr">
    <h1><i class="fa-solid fa-shield-halved"></i> Admin</h1>
    <div class="hdr-acts">
        <span id="user-label" class="hdr-user"></span>
        <button id="refresh-btn" class="btn btn-sm btn-info"><i class="fa-solid fa-rotate"></i></button>
        <button id="logout-btn" class="btn btn-sm btn-ng"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
</div>

<div id="loading" class="loading hide"><i class="fa-solid fa-spinner fa-spin"></i> 読込中...</div>

<!-- ===== 1. Weekly Challenge (top priority) ===== -->
<div class="card">
    <div class="card-h th-orange" onclick="tog(this)">
        <i class="ico fa-solid fa-bolt"></i> 今週のチャレンジ
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b" id="sec-weekly"></div>
</div>

<!-- ===== 2. Weight Config ===== -->
<div class="card">
    <div class="card-h th-orange" onclick="tog(this)">
        <i class="ico fa-solid fa-scale-balanced"></i> 選出確率 / 重み設定
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b" id="sec-weight"></div>
</div>

<!-- ===== 3. Free exercises ===== -->
<div class="card">
    <div class="card-h th-green shut" onclick="tog(this)">
        <i class="ico fa-solid fa-dumbbell"></i> フリーモード種目
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b shut" id="sec-free"></div>
</div>

<!-- ===== 4. Multipliers ===== -->
<div class="card">
    <div class="card-h th-purple shut" onclick="tog(this)">
        <i class="ico fa-solid fa-sliders"></i> 倍率設定
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b shut" id="sec-mul"></div>
</div>

<!-- ===== 5. Champions ===== -->
<div class="card">
    <div class="card-h th-orange shut" onclick="tog(this)">
        <i class="ico fa-solid fa-crown"></i> 歴代チャンピオン
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b shut" id="sec-champ"></div>
</div>

<!-- ===== 6. Challenge history ===== -->
<div class="card">
    <div class="card-h th-orange shut" onclick="tog(this)">
        <i class="ico fa-solid fa-clock-rotate-left"></i> チャレンジ履歴
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b shut" id="sec-hist"></div>
</div>

<!-- ===== 7. Users ===== -->
<div class="card">
    <div class="card-h th-pink shut" onclick="tog(this)">
        <i class="ico fa-solid fa-users"></i> ユーザー
        <i class="arr fa-solid fa-chevron-down"></i>
    </div>
    <div class="card-b shut" id="sec-users"></div>
</div>

</div><!-- /app -->

<!-- Confirm overlay -->
<div id="confirm-overlay" class="overlay hide">
    <div class="overlay-box">
        <h3 id="confirm-title"></h3>
        <p id="confirm-msg"></p>
        <div class="overlay-btns">
            <button class="btn btn-sm btn-ghost" onclick="closeConfirm()">キャンセル</button>
            <button class="btn btn-sm btn-warn" id="confirm-ok">実行</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// ====================================================================
// GLOBALS
// ====================================================================
const $ = id => document.getElementById(id);
let _exercises = {}, _wc = null, _wcConfig = {}, _users = {}, _override = null;

// ====================================================================
// UTILS
// ====================================================================
function esc(s) { if (typeof s !== 'string') return String(s ?? ''); return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function fmtTs(ts) { if (!ts) return '—'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function fmtDate(ts) { if (!ts) return '—'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', month: 'numeric', day: 'numeric', weekday: 'short' }); }
function tog(el) { el.classList.toggle('shut'); el.nextElementSibling.classList.toggle('shut'); }

// 来週の開始日時（JST 日曜17:00, UTC換算）を返す
function getNextWeekStart() {
    const JST_OFFSET_MS = 9 * 60 * 60 * 1000;
    const now = new Date();
    const jstMs = now.getTime() + JST_OFFSET_MS;
    const jstDate = new Date(jstMs);
    const jstDayOfWeek = jstDate.getUTCDay();
    const jstHour = jstDate.getUTCHours();
    const jstMin = jstDate.getUTCMinutes();
    const jstSec = jstDate.getUTCSeconds();
    const jstMsec = jstDate.getUTCMilliseconds();
    const todayJstDayStartMs = jstMs - (jstHour * 3600 + jstMin * 60 + jstSec) * 1000 - jstMsec;
    let daysBack = (jstDayOfWeek === 0 && jstHour < 17) ? 7 : jstDayOfWeek;
    const lastSundayJstDayStartMs = todayJstDayStartMs - daysBack * 24 * 60 * 60 * 1000;
    const currentWeekStartUTC = new Date(lastSundayJstDayStartMs + 17 * 60 * 60 * 1000 - JST_OFFSET_MS);
    return new Date(currentWeekStartUTC.getTime() + 7 * 24 * 60 * 60 * 1000);
}

// Toast
function toast(msg, dur = 2000) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), dur); }

// Confirm dialog
let _confirmCb = null;
function showConfirm(title, msg, cb) { $('confirm-title').textContent = title; $('confirm-msg').textContent = msg; _confirmCb = cb; $('confirm-overlay').classList.remove('hide'); }
function closeConfirm() { $('confirm-overlay').classList.add('hide'); _confirmCb = null; }
$('confirm-ok').addEventListener('click', () => { if (_confirmCb) _confirmCb(); closeConfirm(); });

// ====================================================================
// AUTH
// ====================================================================
auth.onAuthStateChanged(async u => {
    if (u) {
        $('login-wrap').style.display = 'none';
        $('app').style.display = 'block';
        const ud = await db.collection('users').doc(u.uid).get();
        $('user-label').textContent = ud.exists ? ud.data().userName : u.email;
        loadAll();
    } else {
        $('login-wrap').style.display = 'flex';
        $('app').style.display = 'none';
    }
});

$('login-btn').addEventListener('click', async () => {
    $('auth-error').textContent = '';
    const em = $('email').value.trim(), pw = $('password').value;
    if (!em || !pw) { $('auth-error').textContent = '入力してください'; return; }
    try { await auth.signInWithEmailAndPassword(em, pw); }
    catch (e) {
        const m = { 'auth/invalid-email': 'メール形式が不正', 'auth/user-not-found': 'ユーザー不明', 'auth/wrong-password': 'パスワード不正', 'auth/invalid-credential': '認証情報が不正' };
        $('auth-error').textContent = m[e.code] || 'ログイン失敗';
    }
});
$('password').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });
$('email').addEventListener('keydown', e => { if (e.key === 'Enter') $('password').focus(); });
$('logout-btn').addEventListener('click', () => auth.signOut());
$('refresh-btn').addEventListener('click', () => loadAll());

// ====================================================================
// DATA LOAD
// ====================================================================
async function loadAll() {
    $('loading').classList.remove('hide');
    try {
        const [exDoc, wcDoc, cfgDoc, overrideDoc, mFree, mNorm, mInt, champSnap, histSnap, usrSnap] = await Promise.all([
            db.collection('settings_free').doc('exercises').get(),
            db.collection('settings_free').doc('weekly_challenge').get(),
            db.collection('settings_free').doc('weekly_config').get(),
            db.collection('settings_free').doc('weekly_override').get(),
            db.collection('settings_free').doc('multipliers').get(),
            db.collection('settings').doc('multipliers').get(),
            db.collection('settings_interval').doc('multipliers').get(),
            db.collection('weekly_champions').orderBy('weekStart', 'desc').get(),
            db.collection('weekly_challenge_history').orderBy('weekStart', 'desc').get(),
            db.collection('users').get()
        ]);
        _exercises = exDoc.exists ? (exDoc.data().exercises || {}) : {};
        _wc = wcDoc.exists ? wcDoc.data() : null;
        _wcConfig = cfgDoc.exists ? cfgDoc.data() : { weightExponent: 2 };
        _override = overrideDoc.exists ? overrideDoc.data() : null;
        _users = {};
        usrSnap.forEach(d => { _users[d.id] = d.data(); });

        renderWeekly();
        renderWeight();
        renderFree();
        renderMul(mFree, mNorm, mInt);
        renderChamp(champSnap);
        renderHist(histSnap);
        renderUsers(usrSnap);
    } catch (e) {
        console.error(e);
        alert('取得失敗: ' + e.message);
    } finally {
        $('loading').classList.add('hide');
    }
}

// ====================================================================
// 1. WEEKLY CHALLENGE
// ====================================================================
function renderWeekly() {
    const el = $('sec-weekly');
    let html = '';
    if (!_wc) {
        html = '<p style="color:var(--tx2);text-align:center;padding:12px">データなし</p>';
    } else {
        const keys = _wc.exercises || [];
        const overrideMark = _wc.isManualOverride
            ? ` <span class="badge badge-star"><i class="fa-solid fa-star"></i> ${esc(_wc.overrideLabel || '特別イベント')}</span>`
            : '';
        html = `<div class="info-panel">
        <div class="ip-row"><span class="ip-label">期間</span><span class="ip-val">${fmtDate(_wc.weekStart)} 〜 ${fmtDate(_wc.weekEnd)}${overrideMark}</span></div>
        <div class="ip-row"><span class="ip-label">更新</span><span class="ip-val">${fmtTs(_wc.updatedAt)}</span></div>
        <div class="ip-row"><span class="ip-label">操作</span><span class="ip-val"><button class="btn btn-sm btn-warn" onclick="forceReselect()" style="font-size:11px"><i class="fa-solid fa-rotate"></i> 今週を強制再選定</button></span></div>
    </div>`;
        if (keys.length === 0) {
            html += '<p style="color:var(--tx2)">選出種目なし</p>';
        } else {
            keys.forEach((key, i) => {
                const ex = _exercises[key] || {};
                const ic = ex.icon ? `fa-solid ${ex.icon}` : 'fa-solid fa-question';
                const barb = ex.barbarian ? ' <span class="badge badge-barb"><i class="fa-solid fa-stopwatch"></i> TA</span>' : '';
                const selCount = (_wc.selectionHistory || {})[key] || 0;
                html += `<div class="wk-ex">
            <i class="${ic} wk-icon"></i>
            <div class="wk-body">
                <div class="wk-name">${esc(ex.name || key)}${barb}</div>
                <div class="wk-sub">#${i + 1} / 累積${selCount}回選出</div>
            </div>
            <div class="wk-acts">
                <button class="btn btn-sm btn-warn" onclick="rerollOne('${esc(key)}',${i})" title="この種目だけ再抽選"><i class="fa-solid fa-dice"></i></button>
            </div>
        </div>`;
            });
        }
    }

    // 来週の手動設定セクション
    const availExs = Object.entries(_exercises)
        .filter(([, ex]) => !ex.excludeFromWeekly)
        .sort((a, b) => (a[1].name || '').localeCompare(b[1].name || '', 'ja'));
    const hasBarbEx = availExs.some(([, ex]) => ex.barbarian);
    const preKeys = (_override && _override.exercises) || ['', '', ''];
    const preLabel = (_override && _override.label) || '特別イベント';
    const makeOpts = (sel) => availExs.map(([k, ex]) =>
        `<option value="${esc(k)}"${k === sel ? ' selected' : ''}>${esc(ex.name + (ex.barbarian ? ' [TA]' : ''))}</option>`
    ).join('');

    html += `<hr style="border:none;border-top:1px solid #eee;margin:10px 0">
    <div style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px"><i class="fa-solid fa-wand-magic-sparkles"></i> 来週のチャレンジを手動設定</div>`;
    if (_override) {
        const targetWeekStr = _override.targetWeekStart ? fmtDate(_override.targetWeekStart) + '週' : '来週';
        html += `<div class="cfg-result" style="margin-bottom:8px"><i class="fa-solid fa-circle-check"></i> 設定済み（対象: ${esc(targetWeekStr)}）: ${esc(preLabel)} — ${preKeys.map(k => esc((_exercises[k] && _exercises[k].name) || k)).join(' / ')}</div>`;
    }
    html += `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">
        <select id="override-ex-0" style="padding:6px 8px;border:1.5px solid var(--bdr);border-radius:7px;font-size:12px"><option value="">— 種目1を選択 —</option>${makeOpts(preKeys[0])}</select>
        <select id="override-ex-1" style="padding:6px 8px;border:1.5px solid var(--bdr);border-radius:7px;font-size:12px"><option value="">— 種目2を選択 —</option>${makeOpts(preKeys[1])}</select>
        <select id="override-ex-2" style="padding:6px 8px;border:1.5px solid var(--bdr);border-radius:7px;font-size:12px"><option value="">— 種目3を選択 —</option>${makeOpts(preKeys[2])}</select>
    </div>
    <div class="cfg-row" style="margin-bottom:8px">
        <label>イベント名:</label>
        <input type="text" id="override-label" value="${esc(preLabel)}" placeholder="特別イベント" style="flex:1;padding:6px 8px;border:1.5px solid var(--bdr);border-radius:7px;font-size:12px">
    </div>`;
    if (hasBarbEx) {
        html += `<p class="cfg-hint" style="margin-bottom:8px"><i class="fa-solid fa-circle-info" style="color:var(--info)"></i> Barbarian（TA）種目を1つ含めることを推奨します</p>`;
    }
    html += `<button class="btn btn-ok" style="width:100%;margin-top:2px" onclick="saveWeeklyOverride()"><i class="fa-solid fa-floppy-disk"></i> 来週の種目を設定する</button>`;
    el.innerHTML = html;
}

// Re-roll single exercise
async function rerollOne(oldKey, idx) {
    const name = _exercises[oldKey]?.name || oldKey;
    showConfirm('1種目リロール', `「${name}」を別の種目に入れ替えますか？`, async () => {
        $('loading').classList.remove('hide');
        try {
            const hist = _wc.selectionHistory || {};
            const exp = _wcConfig.weightExponent || 2;
            const currentKeys = _wc.exercises || [];
            // 候補: 現在選出中以外 かつ 週間チャレンジ除外フラグなし
            const candidates = Object.keys(_exercises).filter(k => !currentKeys.includes(k) && !_exercises[k]?.excludeFromWeekly);
            if (candidates.length === 0) { toast('入替候補がありません'); return; }
            // 重み付き抽選
            const weights = candidates.map(k => 1 / Math.pow((hist[k] || 0) + 1, exp));
            const total = weights.reduce((s, w) => s + w, 0);
            let r = Math.random() * total, picked = candidates[0];
            for (let j = 0; j < candidates.length; j++) { r -= weights[j]; if (r <= 0) { picked = candidates[j]; break; } }
            // 更新
            const newExercises = [...currentKeys];
            newExercises[idx] = picked;
            // 旧種目の選出回数を-1（リロールなので取り消し）、新種目を+1
            const newHist = { ...hist };
            if (newHist[oldKey] > 0) newHist[oldKey]--;
            newHist[picked] = (newHist[picked] || 0) + 1;
            await db.collection('settings_free').doc('weekly_challenge').update({
                exercises: newExercises,
                selectionHistory: newHist,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            toast(`${_exercises[picked]?.name || picked} に入替完了`);
            await loadAll();
        } catch (e) { console.error(e); toast('エラー: ' + e.message); }
        finally { $('loading').classList.add('hide'); }
    });
}

// ====================================================================
// 2. WEIGHT CONFIG + TABLE
// ====================================================================
function renderWeight() {
    const el = $('sec-weight');
    const hist = (_wc && _wc.selectionHistory) || {};
    const curSel = (_wc && _wc.exercises) || [];
    const exp = _wcConfig.weightExponent || 2;
    const allKeys = Object.keys(_exercises);

    // Config editor
    let html = `<div class="cfg-hint"><i class="fa-solid fa-circle-info"></i> 重み = 1/(選出回数+1)<sup>指数</sup> — 指数が大きいほど再選出されにくい</div>
    <div class="cfg-row">
        <label>重み指数:</label>
        <input type="number" id="cfg-exp" value="${exp}" min="0.5" max="10" step="0.5" style="width:60px">
        <button class="btn btn-sm btn-ok" onclick="saveWeightConfig()"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
    </div>
    <div class="cfg-hint" id="exp-preview"></div>
    <div id="cfg-exp-result" class="cfg-result"></div>
    <hr style="border:none;border-top:1px solid #eee;margin:10px 0">`;

    // Weight list
    if (allKeys.length === 0) { html += '<p style="color:var(--tx2)">種目なし</p>'; el.innerHTML = html; updateExpPreview(); return; }
    const data = allKeys.map(k => {
        const c = hist[k] || 0;
        const excluded = !!_exercises[k]?.excludeFromWeekly;
        const w = excluded ? 0 : 1 / Math.pow(c + 1, exp);
        return { k, name: _exercises[k]?.name || '?', count: c, weight: w, sel: curSel.includes(k), excluded };
    });
    const totalW = data.reduce((s, d) => s + d.weight, 0);
    const maxP = data.length > 0 ? Math.max(...data.map(d => totalW > 0 ? d.weight / totalW : 0)) : 0;
    data.sort((a, b) => b.weight - a.weight);

    let rank = 0;
    data.forEach(d => {
        const p = (!d.excluded && totalW > 0) ? (d.weight / totalW) : 0;
        const pPct = (p * 100).toFixed(1);
        const barW = maxP > 0 ? Math.round(p / maxP * 100) : 0;
        const barColor = d.sel ? '#f57f17' : 'var(--pri)';
        const selMark = d.sel ? ' <span class="badge badge-sel"><i class="fa-solid fa-star"></i></span>' : '';
        const exclMark = d.excluded ? ' <span class="badge" style="background:#eee;color:#888"><i class="fa-solid fa-calendar-xmark"></i> 除外</span>' : '';
        const rankLabel = d.excluded ? '—' : ++rank;
        html += `<div class="wt-item">
            <span class="wt-rank">${rankLabel}</span>
            <span class="wt-name">${esc(d.name)}${selMark}${exclMark}</span>
            <span class="wt-count">${d.excluded ? '—' : d.count + '回'}</span>
            <div class="wt-bar-wrap"><div class="wt-bar" style="width:${barW}%;background:${barColor}"></div></div>
            <span class="wt-pct">${d.excluded ? '0%' : pPct + '%'}</span>
        </div>`;
    });
    el.innerHTML = html;
    updateExpPreview();
    // Live preview when input changes
    const inp = $('cfg-exp');
    if (inp) inp.addEventListener('input', updateExpPreview);
}

function updateExpPreview() {
    const inp = $('cfg-exp');
    const prev = $('exp-preview');
    if (!inp || !prev) return;
    const e = parseFloat(inp.value) || 2;
    prev.innerHTML = `<b>プレビュー:</b> 0回→100%, 1回→${(100 / Math.pow(2, e)).toFixed(1)}%, 2回→${(100 / Math.pow(3, e)).toFixed(1)}%, 3回→${(100 / Math.pow(4, e)).toFixed(1)}%`;
}

async function saveWeightConfig() {
    const v = parseFloat($('cfg-exp').value);
    if (isNaN(v) || v < 0.5 || v > 10) { $('cfg-exp-result').textContent = '0.5〜10の値を入力'; $('cfg-exp-result').className = 'cfg-result cfg-err'; return; }
    try {
        await db.collection('settings_free').doc('weekly_config').set({
            weightExponent: v,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        _wcConfig.weightExponent = v;
        $('cfg-exp-result').textContent = `指数を ${v} に保存しました`;
        $('cfg-exp-result').className = 'cfg-result';
        renderWeight();
        toast('重み指数を保存');
    } catch (e) {
        $('cfg-exp-result').textContent = '保存失敗: ' + e.message;
        $('cfg-exp-result').className = 'cfg-result cfg-err';
    }
}

// ====================================================================
// 3. FREE EXERCISES
// ====================================================================
function renderFree() {
    const el = $('sec-free');
    const entries = Object.entries(_exercises);
    const barbC = entries.filter(([, e]) => e.barbarian).length;
    const tags = new Set();
    entries.forEach(([, e]) => (e.tags || []).forEach(t => tags.add(t)));

    let html = `<div class="stats">
        <div class="chip"><div class="v">${entries.length}</div><div class="l">種目</div></div>
        <div class="chip"><div class="v">${barbC}</div><div class="l">TA</div></div>
        <div class="chip"><div class="v">${entries.length - barbC}</div><div class="l">回数系</div></div>
        <div class="chip"><div class="v">${tags.size}</div><div class="l">タグ</div></div>
    </div>`;

    if (entries.length === 0) { html += '<p style="color:var(--tx2)">種目なし</p>'; el.innerHTML = html; return; }
    entries.sort((a, b) => (b[1].createdAt || '').localeCompare(a[1].createdAt || ''));
    entries.forEach(([key, ex]) => {
        const ic = ex.icon ? `fa-solid ${ex.icon}` : 'fa-solid fa-dumbbell';
        const tgs = (ex.tags || []).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('');
        const barb = ex.barbarian ? ' <span class="badge badge-barb"><i class="fa-solid fa-stopwatch"></i> TA</span>' : '';
        const excl = ex.excludeFromWeekly ? ' <span class="badge" style="background:#eee;color:#888"><i class="fa-solid fa-calendar-xmark"></i> 除外</span>' : '';
        html += `<div class="ex-card">
            <i class="${ic} ex-icon"></i>
            <div class="ex-body">
                <div class="ex-name">${esc(ex.name || '(名称なし)')}${barb}${excl}</div>
                <div class="ex-meta">${esc(ex.rule || '')}${ex.createdByName ? ' / ' + esc(ex.createdByName) : ''}</div>
                <div class="ex-tags">${tgs}</div>
            </div>
        </div>`;
    });
    el.innerHTML = html;
}

// ====================================================================
// 4. MULTIPLIERS
// ====================================================================
function renderMul(fDoc, nDoc, iDoc) {
    const el = $('sec-mul');
    const names = { pushup: 'プッシュアップ', dips: 'ディップス', squat: '片足スクワット', Lsit: 'Lシット', pullup: '懸垂' };
    function grid(d, label) {
        if (!d) return `<p style="color:var(--tx2);font-size:11px">${label}: 未設定</p>`;
        const items = Object.entries(d).filter(([k]) => k !== 'updatedAt').map(([k, v]) =>
            `<div class="mul-item"><div class="mn">${esc(names[k] || k)}</div><div class="mv">×${Number(v).toFixed(1)}</div></div>`
        ).join('');
        return `<div style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:4px">${label}</div><div class="mul-grid">${items}</div>`;
    }
    el.innerHTML = [
        grid(nDoc?.exists ? nDoc.data() : null, 'ノーマル'),
        grid(iDoc?.exists ? iDoc.data() : null, 'インターバル'),
        grid(fDoc?.exists ? fDoc.data() : null, 'フリー')
    ].join('');
}

// ====================================================================
// 5. CHAMPIONS
// ====================================================================
function renderChamp(snap) {
    const el = $('sec-champ');
    if (snap.empty) { el.innerHTML = '<p style="color:var(--tx2);text-align:center">データなし</p>'; return; }
    let html = '';
    snap.forEach(doc => {
        const d = doc.data();
        const period = d.periodLabel || `${fmtDate(d.weekStart)}〜${fmtDate(d.weekEnd)}`;
        const exKeys = d.exercises ? Object.keys(d.exercises) : [];
        const exHtml = exKeys.map(k => {
            const n = _exercises[k] ? _exercises[k].name : k;
            const v = d.exercises[k]?.value;
            return `<span class="badge badge-tag">${esc(n)}${v != null ? ': ' + v : ''}</span>`;
        }).join('');
        html += `<div class="champ-card">
            <div class="cc-week">${esc(doc.id)} / ${esc(period)}</div>
            <div class="cc-name"><i class="fa-solid fa-crown" style="color:#ffd600"></i> ${esc(d.champUserName || '—')} <span style="font-size:10px;color:var(--tx2)">${d.champTotalScore != null ? Number(d.champTotalScore).toFixed(1) + 'pt' : ''}</span></div>
            <div class="cc-ex">${exHtml || '—'}</div>
        </div>`;
    });
    el.innerHTML = html;
}

// ====================================================================
// 6. HISTORY
// ====================================================================
function renderHist(snap) {
    const el = $('sec-hist');
    if (snap.empty) { el.innerHTML = '<p style="color:var(--tx2);text-align:center">データなし</p>'; return; }
    let html = '';
    snap.forEach(doc => {
        const d = doc.data();
        const exHtml = (d.exercises || []).map(k => { const n = _exercises[k] ? _exercises[k].name : k; return `<span class="badge badge-tag">${esc(n)}</span>`; }).join('');
        html += `<div class="hist-item">
            <span class="hist-id">${esc(doc.id)}</span> <span class="hist-date">${fmtDate(d.weekStart)}〜${fmtDate(d.weekEnd)}</span>
            <div class="hist-ex">${exHtml || '—'}</div>
        </div>`;
    });

}

// ====================================================================
// 7. USERS

function renderUsers(snap) {
    const el = $('sec-users');

// ====================================================================
// 今週の強制再選定
// ====================================================================
async function forceReselect() {
    showConfirm(
        '今週の種目を再選定',
        '現在の週間チャレンジ設定を破棄し、今週の種目を自動選出し直します。投稿データは消えません。実行しますか？',
        async () => {
            $('loading').classList.remove('hide');
            try {
                // weekly_challenge を削除（次回 getOrUpdateWeeklyChallenge が自動選出を再実行）
                await db.collection('settings_free').doc('weekly_challenge').delete();
                // 念のため weekly_override も削除（再選定後に古いイベントが上書きされないよう）
                await db.collection('settings_free').doc('weekly_override').delete().catch(() => {});
                toast('再選定の準備完了。チャレンジページを開くと自動的に新しい種目が選定されます。');
                await loadAll();
            } catch (e) {
                toast('エラー: ' + e.message);
            } finally {
                $('loading').classList.add('hide');
            }
        }
    );
}

// ====================================================================
// 手動上書き保存
// ====================================================================
async function saveWeeklyOverride() {
    const keys = [
        $('override-ex-0').value,
        $('override-ex-1').value,
        $('override-ex-2').value
    ];
    const label = ($('override-label').value || '').trim() || '特別イベント';
    if (keys.some(k => !k)) { toast('3種目すべて選択してください'); return; }
    if (new Set(keys).size !== 3) { toast('重複しない種目を選んでください'); return; }

    const hasBarb = keys.some(k => _exercises[k] && _exercises[k].barbarian);

    const doSave = async () => {
        $('loading').classList.remove('hide');
        try {
            await db.collection('settings_free').doc('weekly_override').set({
                exercises: keys,
                label,
                targetWeekStart: firebase.firestore.Timestamp.fromDate(getNextWeekStart()),
                setAt: firebase.firestore.FieldValue.serverTimestamp(),
                setBy: auth.currentUser ? auth.currentUser.uid : ''
            });
            toast('来週の手動設定を保存しました');
            await loadAll();
        } catch (e) { toast('エラー: ' + e.message); }
        finally { $('loading').classList.add('hide'); }
    };

    if (!hasBarb) {
        showConfirm(
            'Barbarian種目が含まれていません',
            'Barbarian（TA）種目が選ばれていません。通常は1種目含めることを推奨しています。このまま設定しますか？',
            doSave
        );
    } else {
        await doSave();
    }
}
