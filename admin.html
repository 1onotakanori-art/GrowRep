<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowRep Admin - データ一覧</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ====================================================================
           Admin CSS - 自己完結型
           ==================================================================== */
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #fff;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
            --text: #333;
            --text-muted: #888;
            --border: #e0e0e0;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            background: var(--bg-gradient);
            min-height: 100vh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
        }

        /* ---- ログイン画面 ---- */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8em;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .login-box .subtitle {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: var(--primary);
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 10px;
            min-height: 0;
        }

        .error-message:empty { display: none; }

        /* ---- メインコンテナ ---- */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }

        .admin-header {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-header h1 {
            font-size: 1.4em;
            color: var(--primary);
        }

        .admin-header h1 i { margin-right: 6px; }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-actions button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh {
            background: var(--info);
            color: white;
        }

        .btn-refresh:hover { background: #2980b9; }

        .btn-logout {
            background: var(--danger);
            color: white;
        }

        .btn-logout:hover { background: #c0392b; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 1.2em;
            color: var(--primary);
        }

        .loading-overlay.hidden { display: none; }

        /* ---- セクションカード ---- */
        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            color: white;
            padding: 14px 20px;
            font-size: 1em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .section-header.green {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #1a5c2e;
        }

        .section-header.orange {
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            color: #6b3a00;
        }

        .section-header.pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #5c0a2e;
        }

        .section-header .toggle-icon {
            margin-left: auto;
            transition: transform 0.3s;
        }

        .section-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .section-body {
            padding: 16px 20px;
            overflow-x: auto;
        }

        .section-body.collapsed {
            display: none;
        }

        /* ---- テーブル ---- */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            background: #f8f9ff;
            padding: 8px 12px;
            text-align: left;
            border-bottom: 2px solid var(--primary);
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        .data-table td {
            padding: 7px 12px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
        }

        .data-table tr:hover td {
            background: #f8f9ff;
        }

        .data-table .mono {
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 12px;
            color: #555;
        }

        /* ---- タグバッジ ---- */
        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin: 1px 2px;
            background: #eef2ff;
            color: var(--primary);
        }

        .barbarian-badge {
            background: #fff3e0;
            color: #e65100;
        }

        .selected-badge {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .weight-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .weight-high {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .weight-mid {
            background: #fff9c4;
            color: #f57f17;
        }

        .weight-low {
            background: #ffcdd2;
            color: #b71c1c;
        }

        /* ---- 統計サマリー ---- */
        .stats-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .stat-chip {
            background: #f8f9ff;
            border: 1px solid #e0e4ff;
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .stat-chip .stat-value {
            font-size: 1.6em;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-chip .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ---- 週間チャレンジ情報パネル ---- */
        .challenge-info-panel {
            background: linear-gradient(135deg, #fff8e1, #fff3e0);
            border: 1px solid #ffe0b2;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 14px;
        }

        .challenge-info-panel h4 {
            color: #e65100;
            margin-bottom: 8px;
        }

        .challenge-info-panel .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 12px;
            font-size: 13px;
        }

        .challenge-info-panel .info-label {
            font-weight: 600;
            color: #bf360c;
        }

        /* ---- 重み付けビジュアル ---- */
        .weight-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weight-bar {
            height: 14px;
            border-radius: 7px;
            background: var(--primary);
            opacity: 0.8;
            min-width: 4px;
            transition: width 0.3s;
        }

        /* ---- カウンターリスト ---- */
        .counter-inline {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .counter-chip {
            font-size: 12px;
            background: #f5f5f5;
            border-radius: 6px;
            padding: 2px 8px;
        }

        /* ---- ユーザーリスト ---- */
        .user-list-compact {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
        }

        .user-card-mini {
            background: #f8f9ff;
            border: 1px solid #e8ecff;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
        }

        .user-card-mini .user-name {
            font-weight: 700;
            color: var(--primary);
        }

        .user-card-mini .user-email {
            color: var(--text-muted);
            font-size: 12px;
        }

        .user-card-mini .user-meta {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 4px;
        }

        /* ---- レスポンシブ ---- */
        @media (max-width: 768px) {
            .admin-header {
                padding: 12px 16px;
            }
            .section-body {
                padding: 12px;
            }
            .stats-row {
                gap: 8px;
            }
            .stat-chip {
                min-width: 80px;
                padding: 8px 12px;
            }
        }

        /* ---- 倍率一覧テーブル ---- */
        .multiplier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        .multiplier-item {
            background: #f8f9ff;
            border: 1px solid #e8ecff;
            border-radius: 8px;
            padding: 10px 14px;
            text-align: center;
        }

        .multiplier-item .m-name {
            font-size: 12px;
            color: var(--text-muted);
        }

        .multiplier-item .m-value {
            font-size: 1.4em;
            font-weight: 800;
            color: var(--primary);
        }

        /* 歴代チャンプカード */
        .champ-card {
            background: linear-gradient(135deg, #fffde7, #fff8e1);
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 10px;
        }

        .champ-card h4 {
            color: #f57f17;
            margin-bottom: 6px;
        }

        .champ-card .champ-detail {
            font-size: 13px;
            color: #555;
        }

        .no-data {
            color: var(--text-muted);
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        /* スクロール可能テーブル */
        .table-scroll {
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <!-- ============================================================ -->
    <!-- ログイン画面 -->
    <!-- ============================================================ -->
    <div id="login-container" class="login-container" style="display: none;">
        <div class="login-box">
            <h1><i class="fa-solid fa-shield-halved"></i> GrowRep</h1>
            <p class="subtitle">管理者データビューア</p>
            <div id="login-form">
                <input type="email" id="email" placeholder="メールアドレス" required>
                <input type="password" id="password" placeholder="パスワード" required>
                <button id="login-btn" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> ログイン</button>
                <p id="auth-error" class="error-message"></p>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- メインコンテナ -->
    <!-- ============================================================ -->
    <div id="admin-container" class="admin-container">
        <!-- ヘッダー -->
        <div class="admin-header">
            <h1><i class="fa-solid fa-shield-halved"></i> GrowRep Admin</h1>
            <div class="header-actions">
                <span id="user-label" style="font-size:13px;color:#666;"></span>
                <button id="refresh-btn" class="btn-refresh"><i class="fa-solid fa-rotate"></i> 再取得</button>
                <button id="logout-btn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</button>
            </div>
        </div>

        <!-- ローディング -->
        <div id="loading" class="loading-overlay hidden">
            <div><i class="fa-solid fa-spinner fa-spin"></i> データ取得中...</div>
        </div>

        <!-- =========================================== -->
        <!-- 1. フリーモード種目一覧 -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header green" onclick="toggleSection(this)">
                <i class="fa-solid fa-dumbbell"></i> フリーモード種目一覧
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body">
                <div id="free-stats" class="stats-row"></div>
                <div class="table-scroll">
                    <table class="data-table" id="free-exercises-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>アイコン</th>
                                <th>種目名</th>
                                <th>キー</th>
                                <th>ルール</th>
                                <th>タグ</th>
                                <th>バーバリアン</th>
                                <th>作成者</th>
                                <th>作成日時</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- =========================================== -->
        <!-- 2. 週間チャレンジ設定 -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header orange" onclick="toggleSection(this)">
                <i class="fa-solid fa-bolt"></i> 週間チャレンジ（現在の設定）
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body">
                <div id="weekly-challenge-info"></div>
                <div id="weekly-current-exercises"></div>
            </div>
        </div>

        <!-- =========================================== -->
        <!-- 3. 種目選出確率 重み付けパラメータ -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header orange" onclick="toggleSection(this)">
                <i class="fa-solid fa-scale-balanced"></i> 週間チャレンジ 選出確率テーブル（重み付け）
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body">
                <p style="font-size:13px;color:#666;margin-bottom:12px;">
                    <i class="fa-solid fa-circle-info"></i>
                    重み = <code>1 / (累積選出回数 + 1)</code>　→　選出確率 = 重み / 全重みの合計。
                    選ばれた回数が少ないほど次に選ばれやすくなります。
                </p>
                <div class="table-scroll">
                    <table class="data-table" id="weight-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>種目名</th>
                                <th>キー</th>
                                <th>累積選出回数</th>
                                <th>重み (1/(n+1))</th>
                                <th>選出確率</th>
                                <th>確率バー</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- =========================================== -->
        <!-- 4. 倍率 (multipliers) 設定 -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header" onclick="toggleSection(this)">
                <i class="fa-solid fa-sliders"></i> 倍率設定（全モード）
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body" id="multipliers-body">
            </div>
        </div>

        <!-- =========================================== -->
        <!-- 5. 歴代チャンピオン -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header orange" onclick="toggleSection(this)">
                <i class="fa-solid fa-crown"></i> 歴代チャンピオン
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body">
                <div id="champions-list"></div>
            </div>
        </div>

        <!-- =========================================== -->
        <!-- 6. 週間チャレンジ履歴 -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header orange" onclick="toggleSection(this)">
                <i class="fa-solid fa-clock-rotate-left"></i> 週間チャレンジ履歴
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body">
                <div class="table-scroll">
                    <table class="data-table" id="history-table">
                        <thead>
                            <tr>
                                <th>週ID</th>
                                <th>開始日</th>
                                <th>終了日</th>
                                <th>選出種目</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- =========================================== -->
        <!-- 7. ユーザー一覧 -->
        <!-- =========================================== -->
        <div class="section-card">
            <div class="section-header pink" onclick="toggleSection(this)">
                <i class="fa-solid fa-users"></i> 登録ユーザー一覧
                <i class="fa-solid fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-body">
                <div id="users-stats" class="stats-row"></div>
                <div id="users-list" class="user-list-compact"></div>
            </div>
        </div>

    </div>

    <!-- ============================================================ -->
    <!-- Firebase SDK -->
    <!-- ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
    // ====================================================================
    // Admin Script
    // ====================================================================

    // DOM
    const loginContainer = document.getElementById('login-container');
    const adminContainer = document.getElementById('admin-container');
    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const authError = document.getElementById('auth-error');
    const logoutBtn = document.getElementById('logout-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const userLabel = document.getElementById('user-label');
    const loadingOverlay = document.getElementById('loading');

    // HTMLエスケープ
    function escapeHtml(str) {
        if (typeof str !== 'string') return String(str ?? '');
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // タイムスタンプ→日本語日時文字列
    function formatTimestamp(ts) {
        if (!ts) return '—';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
    }

    function formatDateShort(ts) {
        if (!ts) return '—';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', month: 'numeric', day: 'numeric', weekday: 'short' });
    }

    // セクション折りたたみ
    function toggleSection(headerEl) {
        headerEl.classList.toggle('collapsed');
        const body = headerEl.nextElementSibling;
        body.classList.toggle('collapsed');
    }

    // ====================================================================
    // 認証
    // ====================================================================
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            loginContainer.style.display = 'none';
            adminContainer.style.display = 'block';
            // ユーザー名を取得
            const userData = await db.collection('users').doc(user.uid).get();
            const name = userData.exists ? userData.data().userName : user.email;
            userLabel.textContent = `${name} でログイン中`;
            loadAllData();
        } else {
            loginContainer.style.display = 'flex';
            adminContainer.style.display = 'none';
        }
    });

    loginBtn.addEventListener('click', async () => {
        authError.textContent = '';
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
            authError.textContent = 'メールアドレスとパスワードを入力してください';
            return;
        }
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (e) {
            const msgs = {
                'auth/invalid-email': 'メールアドレスの形式が正しくありません',
                'auth/user-not-found': 'ユーザーが見つかりません',
                'auth/wrong-password': 'パスワードが間違っています',
                'auth/invalid-credential': 'メールアドレスまたはパスワードが間違っています'
            };
            authError.textContent = msgs[e.code] || 'ログインに失敗しました';
        }
    });

    // Enterキーでログイン
    passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loginBtn.click();
    });
    emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') passwordInput.focus();
    });

    logoutBtn.addEventListener('click', () => auth.signOut());
    refreshBtn.addEventListener('click', () => loadAllData());

    // ====================================================================
    // データ一括取得・表示
    // ====================================================================
    async function loadAllData() {
        loadingOverlay.classList.remove('hidden');
        try {
            // 並列で全データ取得
            const [
                exercisesDoc,
                weeklyChallengeDoc,
                multipliersFree,
                multipliersNormal,
                multipliersInterval,
                championsSnap,
                historySnap,
                usersSnap
            ] = await Promise.all([
                db.collection('settings_free').doc('exercises').get(),
                db.collection('settings_free').doc('weekly_challenge').get(),
                db.collection('settings_free').doc('multipliers').get(),
                db.collection('settings').doc('multipliers').get(),
                db.collection('settings_interval').doc('multipliers').get(),
                db.collection('weekly_champions').orderBy('weekStart', 'desc').get(),
                db.collection('weekly_challenge_history').orderBy('weekStart', 'desc').get(),
                db.collection('users').get()
            ]);

            // ユーザーマップ作成
            const usersMap = {};
            usersSnap.forEach(doc => {
                usersMap[doc.id] = doc.data();
            });

            // 種目データ
            const exercises = exercisesDoc.exists ? (exercisesDoc.data().exercises || {}) : {};

            // 週間チャレンジデータ
            const weeklyChallenge = weeklyChallengeDoc.exists ? weeklyChallengeDoc.data() : null;

            // 表示
            renderFreeExercises(exercises);
            renderWeeklyChallenge(weeklyChallenge, exercises);
            renderWeightTable(exercises, weeklyChallenge);
            renderMultipliers(multipliersFree, multipliersNormal, multipliersInterval);
            renderChampions(championsSnap, exercises);
            renderHistory(historySnap, exercises);
            renderUsers(usersSnap, usersMap);

        } catch (error) {
            console.error('データ取得エラー:', error);
            alert('データの取得に失敗しました:\n' + error.message);
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }

    // ====================================================================
    // 1. フリーモード種目一覧
    // ====================================================================
    function renderFreeExercises(exercises) {
        const tbody = document.querySelector('#free-exercises-table tbody');
        const statsEl = document.getElementById('free-stats');
        const entries = Object.entries(exercises);

        // 統計
        const totalCount = entries.length;
        const barbarianCount = entries.filter(([, e]) => e.barbarian).length;
        const allTags = new Set();
        entries.forEach(([, e]) => (e.tags || []).forEach(t => allTags.add(t)));

        statsEl.innerHTML = `
            <div class="stat-chip"><span class="stat-value">${totalCount}</span><span class="stat-label">総種目数</span></div>
            <div class="stat-chip"><span class="stat-value">${barbarianCount}</span><span class="stat-label">バーバリアン</span></div>
            <div class="stat-chip"><span class="stat-value">${totalCount - barbarianCount}</span><span class="stat-label">通常(回数系)</span></div>
            <div class="stat-chip"><span class="stat-value">${allTags.size}</span><span class="stat-label">ユニークタグ</span></div>
        `;

        if (entries.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="no-data">種目データがありません</td></tr>';
            return;
        }

        // 作成日時でソート（新しい順）
        entries.sort((a, b) => {
            const ta = a[1].createdAt || '';
            const tb = b[1].createdAt || '';
            return tb.localeCompare(ta);
        });

        tbody.innerHTML = entries.map(([key, ex], i) => {
            const tags = (ex.tags || []).map(t => `<span class="tag-badge">${escapeHtml(t)}</span>`).join('');
            const iconClass = ex.icon ? `fa-solid ${ex.icon}` : 'fa-solid fa-dumbbell';
            const barbarianLabel = ex.barbarian
                ? '<span class="tag-badge barbarian-badge"><i class="fa-solid fa-stopwatch"></i> タイムアタック</span>'
                : '<span style="color:#ccc;">—</span>';
            const createdAt = ex.createdAt ? new Date(ex.createdAt).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }) : '—';
            return `<tr>
                <td>${i + 1}</td>
                <td><i class="${iconClass}" style="font-size:1.2em;color:var(--primary);"></i></td>
                <td><strong>${escapeHtml(ex.name || '(名称なし)')}</strong></td>
                <td class="mono">${escapeHtml(key)}</td>
                <td>${escapeHtml(ex.rule || '—')}</td>
                <td>${tags || '<span style="color:#ccc;">—</span>'}</td>
                <td>${barbarianLabel}</td>
                <td>${escapeHtml(ex.createdByName || ex.createdBy || '—')}</td>
                <td class="mono">${createdAt}</td>
            </tr>`;
        }).join('');
    }

    // ====================================================================
    // 2. 週間チャレンジ設定
    // ====================================================================
    function renderWeeklyChallenge(wc, exercises) {
        const infoEl = document.getElementById('weekly-challenge-info');
        const exEl = document.getElementById('weekly-current-exercises');

        if (!wc) {
            infoEl.innerHTML = '<p class="no-data">週間チャレンジデータがありません</p>';
            exEl.innerHTML = '';
            return;
        }

        const weekStart = formatTimestamp(wc.weekStart);
        const weekEnd = formatTimestamp(wc.weekEnd);
        const updatedAt = formatTimestamp(wc.updatedAt);
        const selectedKeys = wc.exercises || [];

        infoEl.innerHTML = `
            <div class="challenge-info-panel">
                <h4><i class="fa-solid fa-calendar-week"></i> 今週のチャレンジ期間</h4>
                <div class="info-grid">
                    <span class="info-label">開始:</span><span>${weekStart}</span>
                    <span class="info-label">終了:</span><span>${weekEnd}</span>
                    <span class="info-label">更新日時:</span><span>${updatedAt}</span>
                    <span class="info-label">選出種目数:</span><span>${selectedKeys.length}</span>
                </div>
            </div>
        `;

        if (selectedKeys.length === 0) {
            exEl.innerHTML = '<p class="no-data">今週の選出種目がありません</p>';
            return;
        }

        exEl.innerHTML = `
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>アイコン</th>
                        <th>種目名</th>
                        <th>キー</th>
                        <th>バーバリアン</th>
                        <th>タグ</th>
                    </tr>
                </thead>
                <tbody>
                    ${selectedKeys.map((key, i) => {
                        const ex = exercises[key] || {};
                        const iconClass = ex.icon ? `fa-solid ${ex.icon}` : 'fa-solid fa-question';
                        const tags = (ex.tags || []).map(t => `<span class="tag-badge">${escapeHtml(t)}</span>`).join('');
                        const barb = ex.barbarian
                            ? '<span class="tag-badge barbarian-badge"><i class="fa-solid fa-stopwatch"></i> タイムアタック</span>'
                            : '—';
                        return `<tr>
                            <td><span class="tag-badge selected-badge"><i class="fa-solid fa-star"></i> ${i + 1}</span></td>
                            <td><i class="${iconClass}" style="font-size:1.2em;color:#f57f17;"></i></td>
                            <td><strong>${escapeHtml(ex.name || '(不明)')}</strong></td>
                            <td class="mono">${escapeHtml(key)}</td>
                            <td>${barb}</td>
                            <td>${tags || '—'}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        `;
    }

    // ====================================================================
    // 3. 重み付け確率テーブル
    // ====================================================================
    function renderWeightTable(exercises, wc) {
        const tbody = document.querySelector('#weight-table tbody');
        const history = (wc && wc.selectionHistory) ? wc.selectionHistory : {};
        const currentSelected = (wc && wc.exercises) ? wc.exercises : [];
        const allKeys = Object.keys(exercises);

        if (allKeys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="no-data">種目がありません</td></tr>';
            return;
        }

        // 重み計算
        const weightData = allKeys.map(key => {
            const count = history[key] || 0;
            const weight = 1 / (count + 1);
            return { key, name: exercises[key]?.name || '(不明)', count, weight, isSelected: currentSelected.includes(key) };
        });

        const totalWeight = weightData.reduce((s, d) => s + d.weight, 0);
        const maxProb = Math.max(...weightData.map(d => d.weight / totalWeight));

        // 確率降順でソート
        weightData.sort((a, b) => b.weight - a.weight);

        tbody.innerHTML = weightData.map((d, i) => {
            const prob = totalWeight > 0 ? (d.weight / totalWeight) : 0;
            const probPct = (prob * 100).toFixed(1);
            const barWidth = maxProb > 0 ? Math.round((prob / maxProb) * 120) : 0;

            let weightClass = 'weight-high';
            if (prob < 0.05) weightClass = 'weight-low';
            else if (prob < 0.10) weightClass = 'weight-mid';

            const selectedMark = d.isSelected ? ' <span class="tag-badge selected-badge"><i class="fa-solid fa-star"></i> 今週</span>' : '';

            return `<tr>
                <td>${i + 1}</td>
                <td><strong>${escapeHtml(d.name)}</strong>${selectedMark}</td>
                <td class="mono">${escapeHtml(d.key)}</td>
                <td style="text-align:center;">${d.count}</td>
                <td style="text-align:center;"><span class="weight-badge ${weightClass}">${d.weight.toFixed(4)}</span></td>
                <td style="text-align:center;font-weight:700;">${probPct}%</td>
                <td>
                    <div class="weight-bar-container">
                        <div class="weight-bar" style="width:${barWidth}px;background:${d.isSelected ? '#f57f17' : 'var(--primary)'};"></div>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // ====================================================================
    // 4. 倍率設定
    // ====================================================================
    function renderMultipliers(freeMDoc, normalMDoc, intervalMDoc) {
        const container = document.getElementById('multipliers-body');

        const normalExNames = {
            pushup: 'プッシュアップ', dips: 'ディップス', squat: '片足スクワット',
            Lsit: 'Lシット(秒)', pullup: '懸垂(セット)'
        };

        function buildMultiplierGrid(data, label) {
            if (!data) return `<p class="no-data">${label}：設定なし</p>`;
            const items = Object.entries(data)
                .filter(([k]) => k !== 'updatedAt')
                .map(([k, v]) => `
                    <div class="multiplier-item">
                        <div class="m-name">${escapeHtml(normalExNames[k] || k)}</div>
                        <div class="m-value">×${Number(v).toFixed(1)}</div>
                    </div>
                `).join('');
            const updatedAt = data.updatedAt ? `<span style="font-size:11px;color:#999;">更新: ${formatTimestamp(data.updatedAt)}</span>` : '';
            return `<h4 style="margin-bottom:8px;color:var(--primary);">${label} ${updatedAt}</h4>
                    <div class="multiplier-grid" style="margin-bottom:16px;">${items}</div>`;
        }

        container.innerHTML = [
            buildMultiplierGrid(normalMDoc?.exists ? normalMDoc.data() : null, '<i class="fa-solid fa-dumbbell"></i> ノーマルモード'),
            buildMultiplierGrid(intervalMDoc?.exists ? intervalMDoc.data() : null, '<i class="fa-solid fa-stopwatch"></i> インターバルモード'),
            buildMultiplierGrid(freeMDoc?.exists ? freeMDoc.data() : null, '<i class="fa-solid fa-fire"></i> フリーモード')
        ].join('');
    }

    // ====================================================================
    // 5. 歴代チャンピオン
    // ====================================================================
    function renderChampions(snapshot, exercises) {
        const el = document.getElementById('champions-list');
        if (snapshot.empty) {
            el.innerHTML = '<p class="no-data">歴代チャンピオンデータがありません</p>';
            return;
        }

        let html = '<div class="table-scroll"><table class="data-table"><thead><tr>';
        html += '<th>週</th><th>期間</th><th>チャンピオン</th><th>総合得点</th><th>種目</th>';
        html += '</tr></thead><tbody>';

        snapshot.forEach(doc => {
            const d = doc.data();
            const weekId = doc.id;
            const period = d.periodLabel || `${formatDateShort(d.weekStart)} 〜 ${formatDateShort(d.weekEnd)}`;
            const champName = escapeHtml(d.champUserName || '—');
            const totalScore = d.champTotalScore != null ? Number(d.champTotalScore).toFixed(1) : '—';
            const exerciseKeys = d.exercises ? Object.keys(d.exercises) : [];
            const exNames = exerciseKeys.map(k => {
                const ex = exercises[k];
                const name = ex ? ex.name : k;
                const val = d.exercises[k]?.value;
                return `<span class="counter-chip">${escapeHtml(name)}${val != null ? ': ' + val : ''}</span>`;
            }).join(' ');

            html += `<tr>
                <td class="mono">${escapeHtml(weekId)}</td>
                <td>${escapeHtml(period)}</td>
                <td><strong>${champName}</strong></td>
                <td style="text-align:center;font-weight:700;">${totalScore}</td>
                <td><div class="counter-inline">${exNames || '—'}</div></td>
            </tr>`;
        });

        html += '</tbody></table></div>';
        el.innerHTML = html;
    }

    // ====================================================================
    // 6. 週間チャレンジ履歴
    // ====================================================================
    function renderHistory(snapshot, exercises) {
        const tbody = document.querySelector('#history-table tbody');
        if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="4" class="no-data">履歴データがありません</td></tr>';
            return;
        }

        let html = '';
        snapshot.forEach(doc => {
            const d = doc.data();
            const weekId = doc.id;
            const start = formatTimestamp(d.weekStart);
            const end = formatTimestamp(d.weekEnd);
            const exList = (d.exercises || []).map(k => {
                const ex = exercises[k];
                const name = ex ? ex.name : k;
                return `<span class="counter-chip">${escapeHtml(name)}</span>`;
            }).join(' ');

            html += `<tr>
                <td class="mono">${escapeHtml(weekId)}</td>
                <td>${start}</td>
                <td>${end}</td>
                <td><div class="counter-inline">${exList || '—'}</div></td>
            </tr>`;
        });

        tbody.innerHTML = html;
    }

    // ====================================================================
    // 7. ユーザー一覧
    // ====================================================================
    function renderUsers(snapshot, usersMap) {
        const statsEl = document.getElementById('users-stats');
        const listEl = document.getElementById('users-list');

        const count = snapshot.size;
        statsEl.innerHTML = `<div class="stat-chip"><span class="stat-value">${count}</span><span class="stat-label">登録ユーザー数</span></div>`;

        if (snapshot.empty) {
            listEl.innerHTML = '<p class="no-data">ユーザーがいません</p>';
            return;
        }

        let html = '';
        snapshot.forEach(doc => {
            const d = doc.data();
            const createdAt = d.createdAt ? formatTimestamp(d.createdAt) : '—';
            html += `
                <div class="user-card-mini">
                    <div class="user-name"><i class="fa-solid fa-user"></i> ${escapeHtml(d.userName || '(未設定)')}</div>
                    <div class="user-email">${escapeHtml(d.email || '—')}</div>
                    <div class="user-meta">UID: ${escapeHtml(doc.id)} | 登録: ${createdAt}</div>
                </div>
            `;
        });

        listEl.innerHTML = html;
    }

    </script>
