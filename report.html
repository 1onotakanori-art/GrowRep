<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GrowRep ウィークリー（週報 & 分析）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --bg:#0e1116; --panel:#171c24; --panel2:#1f2630; --line:#2a323d;
    --tx:#e6edf3; --tx2:#9aa7b4; --accent:#4ea1ff; --good:#3fb950; --bad:#f85149;
    --warn:#d29922; --gold:#e3b341; --pri:#667eea;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,"Segoe UI",
    "Hiragino Kaku Gothic ProN",Meiryo,sans-serif;font-size:14px;line-height:1.5}
  a{color:var(--accent)}

  /* ---- Login ---- */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .login-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px;max-width:340px;width:100%;text-align:center}
  .login-box h1{font-size:22px;margin:0 0 2px}
  .login-box .sub{color:var(--tx2);font-size:12px;margin-bottom:18px}
  .login-box input{width:100%;padding:10px;margin-bottom:10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--panel2);color:var(--tx)}
  .login-box input:focus{outline:none;border-color:var(--accent)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-pri{background:var(--accent);color:#06121f;width:100%}
  .btn-sm{padding:6px 10px;font-size:12px}
  .btn-ghost{background:var(--panel2);color:var(--tx);border:1px solid var(--line)}
  .err{color:var(--bad);font-size:12px;margin-top:8px;min-height:14px}

  /* ---- Header ---- */
  header{position:sticky;top:0;z-index:10;padding:14px 20px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#141a22,#0e1116);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{margin:0;font-size:18px;white-space:nowrap}
  header .back{font-size:12px;color:var(--tx2);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  header .back:hover{color:var(--accent)}
  header .spacer{flex:1}
  header select{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;max-width:60vw}
  header .uname{font-size:11px;color:var(--tx2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 80px}
  h2{font-size:16px;margin:30px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  h2 .ic{color:var(--accent);margin-right:6px}
  .loading{padding:60px 0;text-align:center;color:var(--tx2)}
  .empty{color:var(--tx2);font-size:12px;padding:8px 0}

  /* ---- 週報（読み物） ---- */
  .report{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 22px 18px}
  .report h1{font-size:21px;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .report h2{font-size:17px;color:#cdd9e5;border:none;margin:22px 0 8px;padding:0}
  .report h3{font-size:14px;margin:16px 0 6px;color:var(--accent)}
  .report p{margin:8px 0}
  .report ul,.report ol{margin:8px 0;padding-left:22px}
  .report li{margin:3px 0}
  .report strong{color:#fff}
  .report blockquote{margin:10px 0;padding:8px 14px;border-left:3px solid var(--accent);background:var(--panel2);border-radius:0 8px 8px 0;color:var(--tx2)}
  .report code{background:var(--panel2);padding:2px 5px;border-radius:4px;font-size:12px}
  .report table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
  .report th,.report td{border:1px solid var(--line);padding:6px 8px;text-align:left}
  .report hr{border:none;border-top:1px solid var(--line);margin:18px 0}

  /* ---- 主役: 週間チャレンジ / ダービー ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .stat{font-size:26px;font-weight:700}
  .stat.small{font-size:18px}
  .lbl{color:var(--tx2);font-size:11px;margin-top:2px}
  table.tbl{width:100%;border-collapse:collapse;font-size:12px}
  table.tbl th,table.tbl td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
  table.tbl th{color:var(--tx2);font-weight:600;font-size:11px}
  table.tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
  .rank1{color:var(--gold);font-weight:700}
  .crown{color:var(--gold)}
  .lead-pill{display:inline-block;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:2px 10px;color:var(--tx2);margin-left:8px}

  /* ---- ペルソナ / カルテ / 種目 / タグ / ライバル（dashboard 移植） ---- */
  .grid-users{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .ucard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column}
  .uhead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .uname2{font-size:16px;font-weight:700}
  .utype{font-size:10px;color:var(--tx2);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .badge{font-size:10px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 7px;color:var(--gold)}
  .badge.no{color:var(--tx2)}
  .mc{font-size:12px;line-height:1.6;color:var(--tx);background:var(--panel2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 11px;margin:2px 0 4px}
  .mc i{color:var(--accent);margin-right:5px}
  .mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
  .mini div{background:var(--panel2);border-radius:8px;padding:6px;text-align:center}
  .mini .n{font-size:15px;font-weight:700}
  .mini .l{font-size:9px;color:var(--tx2)}
  .row{display:flex;gap:12px}
  .col{flex:1;min-width:0}
  .lst{margin:6px 0 0;padding:0;list-style:none;font-size:12px}
  .lst li{display:flex;justify-content:space-between;gap:8px;padding:2px 0;border-bottom:1px dashed var(--line)}
  .lst li span:last-child{color:var(--tx2);white-space:nowrap}
  .lst li.empty{justify-content:flex-start}
  .sect-lbl{font-size:11px;color:var(--tx2);margin-top:12px;text-transform:uppercase;letter-spacing:.05em}
  .pct{font-weight:700}
  .pct.hi{color:var(--good)} .pct.lo{color:var(--bad)} .pct.mid{color:var(--warn)}
  .trend-improving{color:var(--good)}
  .chip{display:inline-block;font-size:10px;background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin:1px;color:var(--tx2)}
  .mom-up{color:var(--good)} .mom-down{color:var(--bad)} .mom-flat{color:var(--tx2)}
  .rival{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px}
  .rival .vs{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .rival .who{font-weight:700}
  .rival .gap{font-size:11px;color:var(--warn)}
  .bar{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:6px}
  .bar > i{display:block;height:100%;background:var(--accent)}
  .neglect{font-size:11px;color:var(--tx2);margin-top:8px}
  .canvas-wrap{position:relative;height:200px;margin-top:8px}

  footer{color:var(--tx2);font-size:11px;text-align:center;padding:24px}
  @media(max-width:600px){ .report{padding:6px 14px 14px} .wrap{padding:14px 12px 70px} }
</style>
</head>
<body>

<!-- ========== Login ========== -->
<div id="login-wrap" class="login-wrap" style="display:none">
  <div class="login-box">
    <h1>💪 GrowRep</h1>
    <p class="sub">ウィークリー（週報 &amp; 分析）</p>
    <input type="email" id="email" placeholder="メールアドレス">
    <input type="password" id="password" placeholder="パスワード">
    <button id="login-btn" class="btn btn-pri"><i class="fa-solid fa-right-to-bracket"></i> ログイン</button>
    <p id="auth-error" class="err"></p>
  </div>
</div>

<!-- ========== App ========== -->
<div id="app" style="display:none">
  <header>
    <h1>📊 ウィークリー</h1>
    <a class="back" href="index.html"><i class="fa-solid fa-arrow-left"></i> ホーム</a>
    <span class="spacer"></span>
    <select id="week-select" title="過去の週を選ぶ"></select>
    <span id="uname" class="uname"></span>
    <button id="logout-btn" class="btn btn-sm btn-ghost" title="ログアウト"><i class="fa-solid fa-right-from-bracket"></i></button>
  </header>

  <div class="wrap">
    <div id="content"><div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div></div>
  </div>
  <footer>GrowRep ウィークリー — 数値は決定論的に集計済み。物語は Claude Cowork、配信はローカルPCから。</footer>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="firebase-config.js"></script>
<script src="report.js"></script>
</body>
</html>
